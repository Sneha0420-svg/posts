<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            max-width: 800px;
            margin: auto;
        }

        .poster {
            width: 100%;
            display: block;
        }

       .logo {
    position: absolute;
    top: 13%;
    left: 10%;
    width: 22%;       /* responsive width */
    max-width: 180px; /* prevents it from becoming too large */
    height: auto;     /* keeps aspect ratio */
    cursor: pointer;
}
    </style>
</head>
<body>

<div class="container">
    <!-- Poster -->
    <img src="./images/POST2.png" alt="investlive poster" class="poster">

    <!-- Clickable Logo -->
    <a href="https://investlive.net/">
        <img src="./images/investlive_logo.png" alt="investlive logo" class="logo">
    </a>
</div>

</body>
</html>

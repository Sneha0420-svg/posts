<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            max-width: 800px;
            margin: auto;
        }

        .poster {
            width: 100%;
            display: block;
        }

        .logo {
            position: absolute;
            top: 40px;
            left: 60px;
            height: 70px;
            width:210px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Poster -->
    <img src="./images/POST2.png" alt="investlive poster" class="poster">

    <!-- Clickable Logo -->
    <a href="https://investlive.net/">
        <img src="./images/investlive_logo.png" alt="investlive logo" class="logo">
    </a>
</div>

</body>
</html>
